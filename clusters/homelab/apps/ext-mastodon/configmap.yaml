---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mastodon-config
  namespace: ext-mastodon
data:
  LOCAL_DOMAIN: "mastodon.klimlive.de"
  SINGLE_USER_MODE: "true"
  DB_HOST: "database-rw"
  DB_PORT: "5432"
  DB_NAME: "mastodon"
  DB_USER: "mastodon"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  STREAMING_API_BASE_URL: "wss://mastodon.klimlive.de"
  RAILS_ENV: "production"
  NODE_ENV: "production"
  RAILS_SERVE_STATIC_FILES: "true"
  RAILS_LOG_LEVEL: "warn"
  SMTP_DELIVERY_METHOD: "none"
  # SSO via Authentik — disables local login, all auth goes through OIDC
  OMNIAUTH_ONLY: "true"
  OIDC_ENABLED: "true"
  OIDC_DISPLAY_NAME: "Authentik"
  OIDC_DISCOVERY: "true"
  OIDC_ISSUER: "https://auth.klimlive.de/application/o/mastodon/"
  OIDC_SCOPE: "openid,profile,email"
  OIDC_UID_FIELD: "preferred_username"
  OIDC_REDIRECT_URI: "https://mastodon.klimlive.de/auth/auth/openid_connect/callback"
  OIDC_SECURITY_ASSUME_EMAIL_IS_VERIFIED: "true"
  # Native OTel tracing (Mastodon >=4.3.0)
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://backend-collector.observability.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ext-mastodon
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      access_log off;
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }
      upstream web { server 127.0.0.1:3001; }
      upstream streaming { server mastodon-streaming:4000; }
      server {
        listen 3000;
        location /api/v1/streaming {
          proxy_pass http://streaming;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
          proxy_buffering off;
          proxy_redirect off;
          proxy_read_timeout 300s;
        }
        location / {
          proxy_pass http://web;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
          proxy_buffering off;
          proxy_redirect off;
          client_max_body_size 99m;
        }
      }
    }
