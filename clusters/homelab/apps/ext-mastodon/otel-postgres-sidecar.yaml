---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: postgres
  namespace: ext-mastodon
spec:
  mode: deployment
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.154.0
  env:
    - name: DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: mastodon-secrets
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: mastodon-secrets
          key: password
  config:
    receivers:
      postgresql:
        endpoint: database-rw:5432
        username: ${env:DB_USERNAME}
        password: ${env:DB_PASSWORD}
        databases:
          - mastodon
        collection_interval: 30s
        tls:
          insecure: true
    processors:
      resource:
        attributes:
          - key: host.name
            value: postgres-mastodon
            action: upsert
    exporters:
      otlphttp:
        endpoint: http://backend.observability.svc.cluster.local:4318
    service:
      pipelines:
        metrics:
          receivers: [postgresql]
          processors: [resource]
          exporters: [otlphttp]
