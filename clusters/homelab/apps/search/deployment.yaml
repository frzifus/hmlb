apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: search
  labels:
    app: searxng
spec:
  replicas: 2
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
    spec:
      containers:
      - name: searxng
        image: searxng/searxng:2026.3.5-56e565a58
        ports:
        - containerPort: 8080
        env:
        - name: SEARXNG_SETTINGS_PATH
          value: /etc/searxng/settings.yml
        - name: OTEL_SERVICE_NAME
          value: searxng
        volumeMounts:
        - name: config
          mountPath: /etc/searxng/settings.yml
          subPath: settings.yml
      volumes:
      - name: config
        configMap:
          name: searxng-config
