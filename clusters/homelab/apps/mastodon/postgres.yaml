apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: database
  namespace: mastodon
spec:
  instances: 1

  storage:
    size: 10Gi
    storageClass: openebs-crucial

  superuserSecret:
    name: mastodon-secrets

  bootstrap:
    initdb:
      database: mastodon
      owner: mastodon
      secret:
        name: mastodon-secrets
