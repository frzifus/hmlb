apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: headless
  name: homelab-headless
  namespace: steam
spec:
  serviceName: headless
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: headless
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: headless
    spec:
      containers:
      - env:
        - name: DESKTOP_RESOLUTION
          value: 1280x720
        - name: DESKTOP_KEYBOARD_LAYOUT
          value: de
        - name: PRESSURE_VESSEL_FILESYSTEMS_RO
        - name: STEAM_COMPAT_FLAGS
          value: container-runtime-off
        image: ghcr.io/frzifus/steam-headless:latest
        imagePullPolicy: Always
        name: steam
        ports:
        - containerPort: 5900
          name: vnc
          protocol: TCP
        - containerPort: 27036
          name: steam-disc
          protocol: UDP
        - containerPort: 27031
          name: steam-dl-1
          protocol: UDP
        - containerPort: 27032
          name: steam-dl-2
          protocol: UDP
        - containerPort: 27033
          name: steam-dl-3
          protocol: UDP
        - containerPort: 27034
          name: steam-dl-4
          protocol: UDP
        - containerPort: 27035
          name: steam-dl-5
          protocol: UDP
        resources:
          limits:
            cpu: "2"
            gpu.intel.com/i915: "1"
            memory: 6Gi
          requests:
            cpu: 100m
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 5000
          runAsNonRoot: true
          runAsUser: 5000
          seccompProfile: # https://github.com/siderolabs/talos/issues/12287 
            type: Unconfined
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /opt/steam/games
          name: steam-games
        - mountPath: /run/user
          name: run-user
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /tmp
          name: tmp
      dnsPolicy: ClusterFirst
      hostUsers: false
      nodeSelector:
        kubernetes.io/hostname: worker1
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 5000
      terminationGracePeriodSeconds: 30
      volumes:
      - name: steam-games
        persistentVolumeClaim:
          claimName: steam-games
      - emptyDir:
          medium: Memory
        name: run-user
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: dshm
      - emptyDir:
          medium: Memory
        name: tmp
