apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app: public-api
  name: public-api-pdb
  namespace: ambient-code
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: public-api
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-bucket
  namespace: ambient-code
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc:latest
        env:
        - name: MC_CONFIG_DIR
          value: /tmp/.mc
        command:
        - /bin/sh
        - -c
        - |
          set -e
          mc alias set minio http://minio.ambient-code.svc:9000 minioadmin minioadmin123
          mc mb --ignore-existing minio/ambient-sessions
          echo "Bucket ambient-sessions is ready"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
