apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ambient-api-server
    component: api
  name: ambient-api-server
  namespace: ambient-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ambient-api-server
      component: api
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ambient-api-server
        component: api
    spec:
      containers:
      - command:
        - /usr/local/bin/ambient-api-server
        - serve
        - --db-host-file=/secrets/db/db.host
        - --db-port-file=/secrets/db/db.port
        - --db-user-file=/secrets/db/db.user
        - --db-password-file=/secrets/db/db.password
        - --db-name-file=/secrets/db/db.name
        - --enable-jwt=false
        - --enable-authz=false
        - --jwk-cert-file=/configs/authentication/jwks.json
        - --enable-https=false
        - --enable-grpc=true
        - --grpc-enable-tls=false
        - --api-server-bindaddress=:8000
        - --metrics-server-bindaddress=:4433
        - --health-check-server-bindaddress=:4434
        - --enable-health-check-https=false
        - --db-sslmode=disable
        - --db-max-open-connections=50
        - --enable-db-debug=false
        - --enable-metrics-https=false
        - --http-read-timeout=5s
        - --http-write-timeout=30s
        - --cors-allowed-origins=*
        - --cors-allowed-headers=X-Ambient-Project
        - --grpc-server-bindaddress=:9000
        - --alsologtostderr
        - -v=10
        env:
        - name: AMBIENT_ENV
          value: development
        image: quay.io/ambient_code/vteam_api_server:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthcheck
            port: 4434
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 1
        name: api-server
        ports:
        - containerPort: 8000
          name: api
          protocol: TCP
        - containerPort: 4433
          name: metrics
          protocol: TCP
        - containerPort: 4434
          name: health
          protocol: TCP
        - containerPort: 9000
          name: grpc
          protocol: TCP
        readinessProbe:
          httpGet:
            httpHeaders:
            - name: User-Agent
              value: Probe
            path: /healthcheck
            port: 4434
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        volumeMounts:
        - mountPath: /secrets/db
          name: db-secrets
          readOnly: true
        - mountPath: /secrets/app
          name: app-secrets
          readOnly: true
        - mountPath: /configs/authentication
          name: auth-config
          readOnly: true
      initContainers:
      - command:
        - /usr/local/bin/ambient-api-server
        - migrate
        - --db-host-file=/secrets/db/db.host
        - --db-port-file=/secrets/db/db.port
        - --db-user-file=/secrets/db/db.user
        - --db-password-file=/secrets/db/db.password
        - --db-name-file=/secrets/db/db.name
        - --db-sslmode=disable
        - --alsologtostderr
        - -v=10
        image: quay.io/ambient_code/vteam_api_server:latest
        imagePullPolicy: IfNotPresent
        name: migration
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        volumeMounts:
        - mountPath: /secrets/db
          name: db-secrets
      serviceAccountName: ambient-api-server
      volumes:
      - name: db-secrets
        secret:
          secretName: ambient-api-server-db
      - name: app-secrets
        secret:
