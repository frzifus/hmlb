kind: Deployment
metadata:
  labels:
    app: agentic-operator
  name: agentic-operator
  namespace: ambient-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-operator
  template:
    metadata:
      labels:
        app: agentic-operator
    spec:
      containers:
      - args:
        - --max-concurrent-reconciles=10
        - --health-probe-bind-address=:8081
        - --leader-elect=false
        env:
        - name: AMBIENT_CODE_RUNNER_IMAGE
          value: quay.io/ambient_code/vteam_claude_runner:latest
        - name: STATE_SYNC_IMAGE
          value: quay.io/ambient_code/vteam_state_sync:latest
        - name: IMAGE_PULL_POLICY
          value: IfNotPresent
        - name: POD_FSGROUP
          value: "0"
        - name: MAX_CONCURRENT_RECONCILES
          value: "10"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BACKEND_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BACKEND_API_URL
          value: http://backend-service:8080/api
        - name: USE_VERTEX
          valueFrom:
            configMapKeyRef:
              key: USE_VERTEX
              name: operator-config
              optional: true
        - name: CLOUD_ML_REGION
          valueFrom:
            configMapKeyRef:
              key: CLOUD_ML_REGION
              name: operator-config
              optional: true
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              key: ANTHROPIC_VERTEX_PROJECT_ID
              name: operator-config
              optional: true
        - name: GOOGLE_APPLICATION_CREDENTIALS
          valueFrom:
            configMapKeyRef:
              key: GOOGLE_APPLICATION_CREDENTIALS
              name: operator-config
              optional: true
        - name: LANGFUSE_ENABLED
          valueFrom:
            secretKeyRef:
              key: LANGFUSE_ENABLED
              name: ambient-admin-langfuse-secret
              optional: true
        - name: LANGFUSE_HOST
          valueFrom:
            secretKeyRef:
              key: LANGFUSE_HOST
              name: ambient-admin-langfuse-secret
              optional: true
        - name: LANGFUSE_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              key: LANGFUSE_PUBLIC_KEY
              name: ambient-admin-langfuse-secret
              optional: true
        - name: LANGFUSE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: LANGFUSE_SECRET_KEY
              name: ambient-admin-langfuse-secret
              optional: true
        - name: GOOGLE_OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: GOOGLE_OAUTH_CLIENT_ID
              name: google-workflow-app-secret
              optional: true
        - name: GOOGLE_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: GOOGLE_OAUTH_CLIENT_SECRET
              name: google-workflow-app-secret
              optional: true
        - name: S3_ENDPOINT
          value: http://minio.ambient-code.svc:9000
        - name: S3_BUCKET
          value: ambient-sessions
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otel-collector.ambient-code.svc:4317
        - name: DEPLOYMENT_ENV
          value: production
        - name: VERSION
          value: latest
        image: quay.io/ambient_code/vteam_operator:v0.2.5
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        name: agentic-operator
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - mountPath: /config/models
          name: model-manifest
          readOnly: true
        - mountPath: /config/registry
          name: agent-registry
          readOnly: true
      restartPolicy: Always
      serviceAccountName: agentic-operator
      volumes:
      - configMap:
          name: ambient-models
          optional: true
        name: model-manifest
      - configMap:
          name: ambient-agent-registry
          optional: true
