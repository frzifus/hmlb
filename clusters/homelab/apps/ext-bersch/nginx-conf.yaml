---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bersch-nginx-conf-template
  namespace: ext-bersch
data:
  default.conf.template: |
    server {
        listen 8080;
        server_name _;

        location = / {
            return 302 /__SECRET_PATH__/;
        }

        location /__SECRET_PATH__/ {
            proxy_pass http://127.0.0.1:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            proxy_pass http://127.0.0.1:8081/static/;
        }

        location /question {
            proxy_pass http://127.0.0.1:8081/question;
        }

        location /answer {
            proxy_pass http://127.0.0.1:8081/answer;
        }

        location /reset {
            proxy_pass http://127.0.0.1:8081/reset;
        }

        location /progress {
            proxy_pass http://127.0.0.1:8081/progress;
        }

        location /joker {
            proxy_pass http://127.0.0.1:8081/joker;
        }

        location / {
            return 404;
        }
    }
