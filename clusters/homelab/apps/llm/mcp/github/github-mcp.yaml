---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp
  namespace: llm
  labels:
    app: github-mcp
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: github-mcp
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp
  namespace: llm
  labels:
    app: github-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp
  template:
    metadata:
      labels:
        app: github-mcp
    spec:
      containers:
        - name: github-mcp-server
          image: ghcr.io/github/github-mcp-server:latest
          args:
            - "http"
            - "--port"
            - "8080"
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-mcp-token
                  key: GITHUB_PERSONAL_ACCESS_TOKEN
            # Enable read-only mode - prevents any write operations
            - name: GITHUB_READ_ONLY
              value: "1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
