---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-bot
  namespace: cicd-builds
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: build-bot-role
  namespace: cicd-builds
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: build-bot-binding
  namespace: cicd-builds
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: build-bot-role
subjects:
  - kind: ServiceAccount
    name: build-bot
    namespace: cicd-builds

