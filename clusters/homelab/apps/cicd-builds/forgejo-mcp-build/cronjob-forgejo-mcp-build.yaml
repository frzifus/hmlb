---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: build-forgejo-mcp-monthly
  namespace: cicd-builds
spec:
  # Build monthly on the first Thursday at 07:00 UTC
  schedule: "0 7 1-7 * 4"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: build-bot
          restartPolicy: OnFailure
          containers:
            - name: trigger-build
              image: rancher/kubectl:v1.36.1
              args:
                - create
                - -f
                - /config/taskrun.yaml
              volumeMounts:
                - name: taskrun-template
                  mountPath: /config
          volumes:
            - name: taskrun-template
              configMap:
                name: forgejo-mcp-build-taskrun-template
