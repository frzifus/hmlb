---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: build-acore-quarterly
  namespace: cicd-builds
spec:
  # Build every 3rd month on the first Wednesday at 07:00 UTC (Jan, Apr, Jul, Oct)
  schedule: "0 7 1-7 1,4,7,10 3"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: build-bot
          restartPolicy: OnFailure
          containers:
            - name: trigger-build
              image: rancher/kubectl:v1.36.2
              args:
                - create
                - -f
                - /config/taskrun.yaml
              volumeMounts:
                - name: taskrun-template
                  mountPath: /config
          volumes:
            - name: taskrun-template
              configMap:
                name: acore-build-taskrun-template
