---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: build-acore-weekly
  namespace: cicd-builds
spec:
  # Build weekly on Sunday at 12:00 UTC
  schedule: "0 12 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: build-bot
          restartPolicy: OnFailure
          containers:
            - name: trigger-build
              image: rancher/kubectl:v1.35.2
              args:
                - create
                - -f
                - /config/taskrun.yaml
              volumeMounts:
                - name: taskrun-template
                  mountPath: /config
          volumes:
            - name: taskrun-template
              configMap:
                name: acore-build-taskrun-template
