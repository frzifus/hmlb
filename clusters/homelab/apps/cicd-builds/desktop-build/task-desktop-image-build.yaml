---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: desktop-image-build
  namespace: cicd-builds
  labels:
    app.kubernetes.io/version: "1.0"
spec:
  description: |
    Clone a git repository and build+push a container image with buildah.
    Combined task that doesn't need a PVC.

    NOTE: Currently runs privileged because Talos nodes don't have user namespaces enabled.
    To run rootless, enable user namespaces on Talos nodes:
      machine:
        sysctls:
          user.max_user_namespaces: "15000"
    Then remove 'privileged: true' and the varlibcontainers volume.
  params:
    - name: GIT_URL
      description: Git repository URL
      type: string
    - name: GIT_REVISION
      description: Git revision (branch, tag, sha)
      type: string
      default: main
    - name: IMAGE
      description: Reference of the image to build and push
      type: string
    - name: DOCKERFILE
      description: Path to the Dockerfile/Containerfile
      type: string
      default: ./Containerfile
    - name: CONTEXT
      description: Build context directory
      type: string
      default: .
    - name: BUILDER_IMAGE
      description: Buildah builder image
      type: string
      default: quay.io/buildah/stable:v1.37
    - name: STORAGE_DRIVER
      description: Buildah storage driver
      type: string
      default: overlay
    - name: FORMAT
      description: Format of the built container (oci or docker)
      type: string
      default: oci
    - name: TLSVERIFY
      description: Verify TLS on registry
      type: string
      default: "true"
  workspaces:
    - name: dockerconfig
      description: Docker config.json for registry authentication
      optional: true
  results:
    - name: IMAGE_DIGEST
      description: Digest of the image built
    - name: IMAGE_URL
      description: Image repository URL
    - name: COMMIT_SHA
      description: Git commit SHA that was built
  steps:
    - name: git-clone
      image: ghcr.io/tektoncd-catalog/git-clone:v1.1.0
      workingDir: /workspace
      volumeMounts:
        - name: git-home
          mountPath: /home/git
      env:
        - name: HOME
          value: /home/git
        - name: PARAM_URL
          value: $(params.GIT_URL)
        - name: PARAM_REVISION
          value: $(params.GIT_REVISION)
        - name: PARAM_DEPTH
          value: "1"
        - name: PARAM_SUBDIRECTORY
          value: source
        - name: PARAM_DELETE_EXISTING
          value: "true"
      script: |
        #!/usr/bin/env sh
        set -eu

        CHECKOUT_DIR="/workspace/${PARAM_SUBDIRECTORY}"

        /ko-app/git-init \
          -url="${PARAM_URL}" \
          -revision="${PARAM_REVISION}" \
          -path="${CHECKOUT_DIR}" \
          -depth="${PARAM_DEPTH}"

        cd "${CHECKOUT_DIR}"
        git rev-parse HEAD | tee $(results.COMMIT_SHA.path)

    - name: build-and-push
      image: $(params.BUILDER_IMAGE)
      workingDir: /workspace/source
      env:
        - name: STORAGE_DRIVER
          value: $(params.STORAGE_DRIVER)
        - name: DOCKERFILE
          value: $(params.DOCKERFILE)
        - name: CONTEXT
          value: $(params.CONTEXT)
        - name: IMAGE
          value: $(params.IMAGE)
        - name: FORMAT
          value: $(params.FORMAT)
        - name: TLSVERIFY
          value: $(params.TLSVERIFY)
      script: |
        #!/bin/bash
        set -e

        [ "$(workspaces.dockerconfig.bound)" = "true" ] && export DOCKER_CONFIG="$(workspaces.dockerconfig.path)"

        # Build the image
        buildah "--storage-driver=${STORAGE_DRIVER}" bud \
          "--format=${FORMAT}" \
          "--tls-verify=${TLSVERIFY}" \
          --no-cache \
          -f "${DOCKERFILE}" \
          -t "${IMAGE}" \
          "${CONTEXT}"

        # Push the image
        buildah "--storage-driver=${STORAGE_DRIVER}" push \
          "--tls-verify=${TLSVERIFY}" \
          --digestfile /tmp/image-digest \
          "${IMAGE}" \
          "docker://${IMAGE}"

        # Output results
        tee "$(results.IMAGE_DIGEST.path)" < /tmp/image-digest
        printf '%s' "${IMAGE}" | tee "$(results.IMAGE_URL.path)"
      volumeMounts:
        - name: varlibcontainers
          mountPath: /var/lib/containers
      securityContext:
        privileged: true
  volumes:
    - name: git-home
      emptyDir: {}
    - name: varlibcontainers
      emptyDir: {}
