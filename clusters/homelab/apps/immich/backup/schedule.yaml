---
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: immich-prod
  namespace: immich
spec:
  backend:
    repoPasswordSecretRef:
      name: backup-credentials
      key: RESTIC_PASSWORD
    s3:
      endpoint: https://s3.us-west-000.backblazeb2.com
      bucket: immich-ff759ae6-7fe3-4ffc-a341-2770e6cd84ba
      accessKeyIDSecretRef:
        name: backup-credentials
        key: ACCESS_KEY_ID
      secretAccessKeySecretRef:
        name: backup-credentials
        key: SECRET_ACCESS_KEY
  backup:
    schedule: "0 4 * * 1"  # Monday at 4 AM
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 3
    # Target specific PVCs by label
    labelSelectors:
      - matchExpressions:
        - key: k8up.io/backup
          operator: In
          values:
            - "true"
    # Follow enshrouded-server pod to same node (required for RWO volumes)
    podConfigRef:
      name: backup-pod-config
  check:
    schedule: "0 4 * * 2"  # Tuesday at 4 AM (day after backup)
  prune:
    schedule: "0 3 * * 3"  # Wednesday at 3 AM (extra buffer)
    retention:
      keepLast: 6
      keepWeekly: 6
