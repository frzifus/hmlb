apiVersion: apps/v1
kind: Deployment
metadata:
  name: enshrouded-server
  labels:
    app: enshrouded-server
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: enshrouded-server
  template:
    metadata:
      labels:
        app: enshrouded-server
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      volumes:
        - name: enshrouded-state
          persistentVolumeClaim:
            claimName: enshrouded-state
      containers:
        - name: enshrouded-server
          image: sknnr/enshrouded-dedicated-server:proton-v2.3.2
          ports:
            - containerPort: 15637
              protocol: UDP
            - containerPort: 27015
              protocol: UDP
          env:
            - name: SERVER_NAME
              value: "Enshrouded Homelab Server"
            - name: SERVER_SLOTS
              value: "16"
            - name: SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: enshrouded-server
                  key: server-password
            - name: PORT
              value: "15637"
            - name: STEAM_PORT
              value: "27015"
          volumeMounts:
            - mountPath: /home/steam/enshrouded/savegame
              name: enshrouded-state
          resources:
            requests:
              cpu: "500m"
              memory: "4Gi"
            limits:
              cpu: "2000m"
              memory: "8Gi"
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: enshrouded-server
spec:
  selector:
    app: enshrouded-server
  ports:
    - protocol: UDP
      name: game
      port: 15637
      targetPort: 15637
    - protocol: UDP
      name: query
      port: 27015
      targetPort: 27015
  type: ClusterIP
---
# Optional: Expose the game server on the LAN via MetalLB (shared IP with ingress-nginx)
apiVersion: v1
kind: Service
metadata:
  name: enshrouded-server-lb
  annotations:
    metallb.universe.tf/allow-shared-ip: "shared-lan"
spec:
  selector:
    app: enshrouded-server
  ports:
    - protocol: UDP
      name: game
      port: 15637
      targetPort: 15637
    - protocol: UDP
      name: query
      port: 27015
      targetPort: 27015
  type: LoadBalancer
  loadBalancerClass: metallb
