---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: authentik
  namespace: flux-system
spec:
  url: https://charts.goauthentik.io
  interval: 1h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: auth
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: "2026.2.2"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  install:
    createNamespace: true
  values:
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: authentik_secret_key
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: password
    authentik:
      postgresql:
        host: database-rw.auth.svc.cluster.local
        name: authentik
        user: authentik
    server:
      ingress:
        enabled: false
    postgresql:
      enabled: false
