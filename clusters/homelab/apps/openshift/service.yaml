---
apiVersion: v1
kind: Service
metadata:
  name: crc-api
spec:
  selector:
    kubevirt.io/vm: crc
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP
    - name: api
      port: 6443
      targetPort: 6443
      protocol: TCP
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
  type: ClusterIP
