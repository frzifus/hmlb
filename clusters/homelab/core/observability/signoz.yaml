apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: signoz
  namespace: observability
spec:
  url: https://charts.signoz.io
  interval: 1h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backend
  namespace: observability
spec:
  releaseName: backend
  interval: 30m
  chart:
    spec:
      chart: signoz
      version: "0.133.0"
      sourceRef:
        kind: HelmRepository
        name: signoz
        namespace: observability
  install:
    createNamespace: false
  upgrade:
    crds: CreateReplace
  values:
    clickhouse:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      persistence:
        size: 50Gi
    queryService:
      configVars:
        storage:
          metrics_ttl_duration_hrs: 720
          traces_ttl_duration_hrs: 24
          logs_ttl_duration_hrs: 24
