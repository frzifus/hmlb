apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: signoz
  namespace: observability
spec:
  url: https://charts.signoz.io
  interval: 1h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backend
  namespace: observability
spec:
  releaseName: backend
  interval: 30m
  chart:
    spec:
      chart: signoz
      version: "0.117.1"
      sourceRef:
        kind: HelmRepository
        name: signoz
        namespace: observability
  install:
    createNamespace: false
  upgrade:
    crds: CreateReplace
  values:
    clickhouse:
      persistence:
        size: 40Gi
    queryService:
      configVars:
        storage:
          metrics_ttl_duration_hrs: 720
          traces_ttl_duration_hrs: 24
          logs_ttl_duration_hrs: 24
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: signoz
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: k8s-infra
      sourceRef:
        kind: HelmRepository
        name: signoz
        namespace: observability
      version: "0.15.0"
  values:
    clusterName: "homelab"
    otelCollectorEndpoint: "backend-signoz-otel-collector:4317"
