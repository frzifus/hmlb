---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    gateway.infra.services/allow-routes: "true"
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: open-telemetry
  namespace: observability
spec:
  url: https://open-telemetry.github.io/opentelemetry-helm-charts
  interval: 1h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: opentelemetry-operator
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: observability
      version: "0.115.0"
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  install:
    createNamespace: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ClusterRole
              name: opentelemetry-operator-manager
            patch: |
              - op: add
                path: /rules/-
                value:
                  apiGroups: ["opentelemetry.io"]
                  resources: ["clusterobservabilities"]
                  verbs: ["get","list","watch","create","update","patch","delete"]
              - op: add
                path: /rules/-
                value:
                  apiGroups: ["opentelemetry.io"]
                  resources: ["clusterobservabilities/status"]
                  verbs: ["get","update","patch"]
              - op: add
                path: /rules/-
                value:
                  apiGroups: ["opentelemetry.io"]
                  resources: ["clusterobservabilities/finalizers"]
                  verbs: ["update"]
  values:
    manager:
      image:
        repository: ghcr.io/frzifus/opentelemetry-operator
        tag: v0.152.0-rev-2
      featureGates: "operator.clusterobservability"
      createRbacPermissions: true
      collectorImage:
        repository: otel/opentelemetry-collector-k8s
      autoInstrumentation:
        go:
          enabled: true
    admissionWebhooks:
      certManager:
        enabled: true
      autoGenerateCert:
        enabled: true
