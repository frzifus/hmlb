---
apiVersion: v1
kind: Namespace
metadata:
  name: spegel
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: spegel
  namespace: spegel
spec:
  type: oci
  url: oci://ghcr.io/spegel-org/helm-charts
  interval: 1h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
  namespace: spegel
spec:
  interval: 1h
  chart:
    spec:
      chart: spegel
      version: "0.7.0"
      sourceRef:
        kind: HelmRepository
        name: spegel
        namespace: spegel
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    spegel:
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
