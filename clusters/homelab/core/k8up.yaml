---
apiVersion: v1
kind: Namespace
metadata:
  name: k8up
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: k8up
  namespace: k8up
spec:
  url: https://k8up-io.github.io/k8up
  interval: 1h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8up
  namespace: k8up
spec:
  interval: 1h
  chart:
    spec:
      chart: k8up
      version: "4.9.0"
      sourceRef:
        kind: HelmRepository
        name: k8up
        namespace: k8up
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
