---
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: kube-etcd-backup
  namespace: kube-system
spec:
  backend:
    repoPasswordSecretRef:
      name: kube-etcd-backup-credentials
      key: RESTIC_PASSWORD
    s3:
      endpoint: https://s3.us-west-000.backblazeb2.com
      bucket: kube-etcd-e9bd4ab5-cdad-4f75-9381-9ffab75851af
      accessKeyIDSecretRef:
        name: kube-etcd-backup-credentials
        key: ACCESS_KEY_ID
      secretAccessKeySecretRef:
        name: kube-etcd-backup-credentials
        key: SECRET_ACCESS_KEY
  backup:
    schedule: "0 4 * * *"
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 3
    labelSelectors:
      - matchLabels:
          k8up.io/backup: "true"
    podConfigRef:
      name: kube-etcd-backup-pod-config
  check:
    schedule: "0 5 * * *"
  prune:
    schedule: "0 6 * * *"
    retention:
      keepLast: 21
      keepDaily: 21
