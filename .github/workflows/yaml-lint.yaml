---
name: YAML Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -s .
